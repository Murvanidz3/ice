name: Deploy to Hostinger via FTP

on:
  push:
    branches:
      - main # Change this if your main branch is called 'master'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Build React App
        run: npm run build

      - name: Prepare Deployment Folder
        run: |
          # The FTP deploy action syncs a specific folder. 
          # We want to deploy both 'dist' (React build) AND 'api' (PHP backend) into the root.
          # So we create a staging folder, copy 'dist' contents into it, then copy 'api' into it.
          mkdir deploy_ready
          cp -r dist/* deploy_ready/
          cp -r api deploy_ready/

      - name: Inject Database Secrets
        run: |
          # We securely replace the local database credentials with the production secrets
          # before sending the files to the Hostinger server.
          sed -i "s/\$host = '.*';/\$host = '${{ secrets.DB_HOST }}';/" deploy_ready/api/db.php
          sed -i "s/\$db = '.*';/\$db = '${{ secrets.DB_NAME }}';/" deploy_ready/api/db.php
          sed -i "s/\$user = '.*';/\$user = '${{ secrets.DB_USER }}';/" deploy_ready/api/db.php
          sed -i "s/\$pass = '.*';/\$pass = '${{ secrets.DB_PASS }}';/" deploy_ready/api/db.php

      - name: Deploy to Hostinger
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./deploy_ready/
          server-dir: ./public_html/ # Or whatever folder you want to deploy to on Hostinger
